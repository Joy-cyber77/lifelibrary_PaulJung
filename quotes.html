  <main class="panel detail">

    <section class="qgroup" data-reveal>
      <div class="qh">교육</div>
      <div class="quotes" style="margin-top:24px;">
        <figure class="quote light"><p>한 명 한 명이 다 귀하다.</p><cite><a href="https://web.archive.org/web/20180807225116/http://www.ohmynews.com/NWS_Web/View/at_pg.aspx?CNTN_CD=A0002460182" target="_blank" rel="noopener">오마이뉴스 · 2018</a></cite></figure>
        <figure class="quote light"><p>교사라는 것은 아이들의 고통에 응답함으로써 우리 시대의 모순에 응답하는 것이다.</p><cite><a href="https://web.archive.org/web/20180807225116/http://www.ohmynews.com/NWS_Web/View/at_pg.aspx?CNTN_CD=A0002460182" target="_blank" rel="noopener">오마이뉴스 · 2018</a></cite></figure>
        <figure class="quote light"><p>깨어나지 않는 아이는 없어요. 아이마다 속도가 다를 뿐, 시스템이 잘못된 거죠.</p><cite>노워리 인터뷰</cite></figure>
        <figure class="quote light"><p>한국교회가 아이들을 염려한다면, 먼저 ‘입시 문제’를 말해야 합니다.</p><cite><a href="https://www.newsnjoy.or.kr/news/articleView.html?idxno=306727" target="_blank" rel="noopener">뉴스앤조이 · 2024.10</a></cite></figure>
      </div>
    </section>

    <!-- 화해 · 대화 -->
    <section class="qgroup" data-reveal>
      <div class="qh">화해 · 대화</div>
      <div class="quotes" style="margin-top:24px;">
        <figure class="quote light"><p>결론이 어떻게 되든 상관없이 과정 속에서 문제가 해결된다.</p><cite><a href="https://cemk.org/22217" target="_blank" rel="noopener">좋은나무 · 2021 · 화해를 위한 대화법</a></cite></figure>
      </div>
    </section>

    <!-- 신앙 · 가정 -->
    <section class="qgroup" data-reveal>
      <div class="qh">신앙 · 가정</div>
      <div class="quotes" style="margin-top:24px;">
        <figure class="quote light"><p>가정 예배는 자녀만을 위한 것이 아니라 부모의 신앙적 성숙을 가져오는 힘의 원천이다.</p><cite><a href="https://cemk.org/14274" target="_blank" rel="noopener">좋은나무 · 2019.08</a></cite></figure>
      </div>
    </section>

    <!-- 시민 · 사회 -->
    <section class="qgroup" data-reveal>
      <div class="qh">시민 · 사회</div>
      <div class="quotes" style="margin-top:24px;">
        <figure class="quote light"><p>민주주의는 인간의 죄성과 연약함을 고려할 때 하나님이 인류에게 허락하신 최선의 선물이다.</p><cite><a href="https://cemk.org/25298" target="_blank" rel="noopener">좋은나무 · 2022.03 · 대선 기도문</a></cite></figure>
      </div>
    </section>

    <!-- 교회 · 권력 -->
    <section class="qgroup" data-reveal>
      <div class="qh">교회 · 권력</div>
      <div class="quotes" style="margin-top:24px;">
        <figure class="quote light"><p>‘사람을 보지 말고 하나님만 바라보라’는 조언은 임시방편의 진통제일 뿐이다.</p><cite><a href="https://cemk.org/42238" target="_blank" rel="noopener">좋은나무 · 2025.07</a></cite></figure>
        <figure class="quote light"><p>한국교회가 교인들의 영적 자립을 키우지 않고 목회자를 맹종하게 하는 목회를 한 결과입니다.</p><cite><a href="https://www.newsnjoy.or.kr/news/articleView.html?idxno=306986" target="_blank" rel="noopener">뉴스앤조이 · 2025.01</a></cite></figure>
      </div>
    </section>
